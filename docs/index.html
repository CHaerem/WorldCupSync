<!DOCTYPE html>
<html lang="nb">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>VM 2026</title>
    <meta name="description" content="Følg og ta igjen fotball-VM 2026 — kamper, sluttspill, statistikk og spoilerfri reprisplanlegging med direktelenker til NRK TV og TV 2 Play." />
    <meta name="theme-color" content="#0b0d10" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E⚽%3C/text%3E%3C/svg%3E" />
    <style>
      :root {
        --bg: #0b0d10;
        --surface: #14171c;
        --raise: #1b1f26;
        --line: rgba(255, 255, 255, 0.09);
        --line-strong: rgba(255, 255, 255, 0.16);
        --fg: #eef1f4;
        --muted: #8b95a1;
        --faint: #5b6470;
        --accent: #34d399;
        --nrk: #f5333f;
        --tv2: #3b82f6;
        --adv: rgba(52, 211, 153, 0.13);
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #fbfcfd; --surface: #fff; --raise: #f4f6f8;
          --line: rgba(0, 0, 0, 0.08); --line-strong: rgba(0, 0, 0, 0.16);
          --fg: #10151b; --muted: #5e6b78; --faint: #97a1ab;
          --adv: rgba(16, 145, 105, 0.1);
        }
      }
      * { box-sizing: border-box; }
      html { -webkit-text-size-adjust: 100%; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--fg);
        font-size: 15px;
        line-height: 1.45;
        -webkit-font-smoothing: antialiased;
        padding-bottom: calc(env(safe-area-inset-bottom, 0) + 24px);
      }
      .wrap { max-width: 560px; margin: 0 auto; padding: 0 16px; }
      a { color: inherit; }

      /* ---- header ---- */
      header {
        position: sticky; top: 0; z-index: 30;
        background: color-mix(in srgb, var(--bg) 88%, transparent);
        backdrop-filter: saturate(1.4) blur(12px);
        border-bottom: 1px solid var(--line);
        padding-top: max(10px, env(safe-area-inset-top, 0));
      }
      .brand { display: flex; align-items: baseline; gap: 9px; padding: 4px 0 10px; }
      .brand h1 { font-size: 19px; font-weight: 750; letter-spacing: -0.02em; margin: 0; }
      .brand .sub { font-size: 12px; color: var(--muted); font-weight: 450; }

      /* spoiler / mode control */
      .mode {
        display: flex; align-items: center; gap: 9px;
        font-size: 12.5px; color: var(--muted); padding: 2px 0 10px;
      }
      .mode b { color: var(--fg); font-weight: 600; }
      .switch { margin-left: auto; position: relative; width: 42px; height: 24px; flex: none; }
      .switch input { opacity: 0; width: 0; height: 0; }
      .slider { position: absolute; inset: 0; background: var(--line-strong); border-radius: 999px; transition: .15s; cursor: pointer; }
      .slider::before { content: ""; position: absolute; height: 18px; width: 18px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: .15s; }
      input:checked + .slider { background: var(--accent); }
      input:checked + .slider::before { transform: translateX(18px); }

      /* ---- nav tabs (underline) ---- */
      nav.tabs { display: flex; gap: 20px; }
      nav.tabs button {
        appearance: none; background: none; border: none; cursor: pointer;
        font: inherit; font-size: 13.5px; font-weight: 600; color: var(--muted);
        padding: 6px 0 11px; position: relative; letter-spacing: -0.01em;
      }
      nav.tabs button.active { color: var(--fg); }
      nav.tabs button.active::after {
        content: ""; position: absolute; left: 0; right: 0; bottom: -1px; height: 2px;
        background: var(--accent); border-radius: 2px;
      }

      main { padding-top: 14px; }

      /* ---- filters ---- */
      .filters { display: flex; gap: 7px; overflow-x: auto; padding-bottom: 14px; scrollbar-width: none; }
      .filters::-webkit-scrollbar { display: none; }
      .filters button {
        flex: none; appearance: none; cursor: pointer; font: inherit;
        font-size: 12.5px; font-weight: 550; padding: 5px 12px; border-radius: 999px;
        background: transparent; color: var(--muted); border: 1px solid var(--line);
      }
      .filters button.active { color: var(--fg); border-color: var(--line-strong); background: var(--surface); }

      /* ---- day section ---- */
      .day { font-size: 11.5px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
        color: var(--faint); margin: 18px 0 4px; }
      .day:first-child { margin-top: 0; }

      /* ---- match row (minimal, hairline-separated) ---- */
      .m { padding: 12px 0; border-bottom: 1px solid var(--line); }
      .m-row { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 10px; }
      .side { display: flex; align-items: center; gap: 8px; min-width: 0; }
      .side.away { flex-direction: row-reverse; }
      .side img { width: 20px; height: 20px; object-fit: contain; flex: none; }
      .side .nm { font-size: 14.5px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .mid { text-align: center; min-width: 52px; }
      .mid .sc { font-size: 16px; font-weight: 750; font-variant-numeric: tabular-nums; letter-spacing: 0.5px; }
      .mid .sc.hide { color: var(--faint); cursor: pointer; font-weight: 600; }
      .mid .sc.hide:hover { color: var(--muted); }
      .mid .tm { font-size: 13px; font-weight: 600; color: var(--muted); font-variant-numeric: tabular-nums; }
      .mid .live { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--nrk); animation: pulse 1.4s infinite; }
      @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .25; } }

      .m-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 8px;
        font-size: 12px; color: var(--muted); }
      .m-meta .dot { color: var(--faint); }
      .pill {
        appearance: none; cursor: pointer; font: inherit; font-size: 12px; font-weight: 600;
        text-decoration: none; padding: 3px 9px; border-radius: 7px; border: 1px solid var(--line);
        background: var(--surface); color: var(--fg); display: inline-flex; align-items: center; gap: 4px;
      }
      .pill:hover { border-color: var(--line-strong); }
      .pill.nrk { background: var(--nrk); border-color: var(--nrk); color: #fff; }
      .pill.tv2 { background: var(--tv2); border-color: var(--tv2); color: #fff; }
      .pill.ghost { background: transparent; color: var(--muted); }
      .grow { flex: 1; }
      .star { appearance: none; background: none; border: none; cursor: pointer; font-size: 16px;
        color: var(--faint); padding: 0 2px; line-height: 1; }
      .star.on { color: var(--accent); }
      .watched { font-size: 11.5px; color: var(--faint); }
      .watched.on { color: var(--accent); }

      /* ---- standings / stats tables ---- */
      .block { margin-bottom: 22px; }
      .block > h3 { font-size: 13px; font-weight: 700; margin: 0 0 8px; letter-spacing: -0.01em; }
      table { width: 100%; border-collapse: collapse; font-size: 13px; font-variant-numeric: tabular-nums; }
      th { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--faint); font-weight: 600; padding: 0 6px 6px; text-align: center; }
      td { padding: 7px 6px; text-align: center; border-top: 1px solid var(--line); }
      th.l, td.l { text-align: left; }
      td.team { display: flex; align-items: center; gap: 8px; font-weight: 550; }
      td.team img { width: 18px; height: 18px; object-fit: contain; }
      tr.adv td { background: var(--adv); }
      td .rk { color: var(--faint); min-width: 20px; margin-right: 7px; display: inline-block; text-align: right; }
      .pts { font-weight: 750; }

      .statline { display: flex; gap: 18px; padding: 2px 0 16px; }
      .statline .n { font-size: 22px; font-weight: 750; letter-spacing: -0.02em; }
      .statline .k { font-size: 11.5px; color: var(--muted); }

      /* ---- bracket ---- */
      .bracket { display: flex; gap: 14px; overflow-x: auto; padding: 4px 2px 16px; scrollbar-width: thin; }
      .bracket::-webkit-scrollbar { height: 6px; }
      .round { flex: none; width: 168px; display: flex; flex-direction: column; }
      .round > h4 { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--faint);
        font-weight: 700; margin: 0 0 8px; }
      .round-body { display: flex; flex-direction: column; justify-content: space-around; flex: 1; gap: 8px; }
      .tie { background: var(--surface); border: 1px solid var(--line); border-radius: 8px; padding: 7px 9px; }
      .tie .t { display: flex; align-items: center; gap: 6px; font-size: 12.5px; padding: 1px 0; min-width: 0; }
      .tie .t img { width: 15px; height: 15px; object-fit: contain; flex: none; }
      .tie .t .nm { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--muted); }
      .tie .t.known .nm { color: var(--fg); font-weight: 600; }
      .tie .t.win .nm { color: var(--accent); }
      .tie .t .g { margin-left: auto; font-variant-numeric: tabular-nums; font-weight: 700; }
      .tie .dt { font-size: 10.5px; color: var(--faint); margin-top: 4px; }
      .tie.final { border-color: var(--accent); }

      /* ---- misc ---- */
      .veil { text-align: center; padding: 30px 18px; border: 1px dashed var(--line-strong);
        border-radius: 12px; color: var(--muted); font-size: 13.5px; }
      .veil .pill { margin-top: 14px; }
      .empty { text-align: center; color: var(--muted); padding: 44px 16px; font-size: 14px; }
      footer { color: var(--faint); font-size: 11px; text-align: center; padding: 28px 16px 8px; line-height: 1.7; }
    </style>
  </head>
  <body>
    <header>
      <div class="wrap">
        <div class="brand">
          <h1>VM 2026</h1>
          <span class="sub">følg &amp; ta igjen verdensmesterskapet</span>
        </div>
        <div class="mode">
          <span id="modeLabel">🙈 Spoilerfri — resultater skjult</span>
          <label class="switch">
            <input type="checkbox" id="spoilerToggle" />
            <span class="slider"></span>
          </label>
        </div>
        <nav class="tabs" id="tabs">
          <button data-view="schedule" class="active">Kamper</button>
          <button data-view="bracket">Sluttspill</button>
          <button data-view="stats">Statistikk</button>
          <button data-view="plan">Min plan</button>
        </nav>
      </div>
    </header>
    <main class="wrap" id="app"><div class="empty">Laster …</div></main>
    <footer>
      Data: ESPN · Reprise: NRK TV &amp; TV 2 Play · Alle tider i Oslo-tid<br />
      Spoilerfri som standard — skru på spoilermodus for å ta igjen resultater, tabeller og toppscorere.
    </footer>
    <script src="js/app.js"></script>
  </body>
</html>
