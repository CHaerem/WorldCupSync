<!DOCTYPE html>
<html lang="nb">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>VM 2026 — følg &amp; ta igjen fotball-VM</title>
    <meta name="description" content="Følg og ta igjen fotball-VM 2026 — kamper dag for dag, sluttspill, statistikk og spoilerfri reprisplanlegging med direktelenker til NRK TV og TV 2 Play." />
    <meta name="theme-color" content="#06070c" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#eaf0fb" media="(prefers-color-scheme: light)" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='24' fill='%23000'/%3E%3Ccircle cx='34' cy='50' r='18' fill='none' stroke='%23fff' stroke-width='9'/%3E%3Cpath d='M58 32h18a0 0 0 0 1 0 0v0a18 18 0 0 1-18 18h0a0 0 0 0 1 0 0V32z' fill='%2336e6a4'/%3E%3C/svg%3E" />
    <style>
      /* ====================================================================
         Liquid Glass — iOS 26 material. Real light refraction (SVG
         displacement) on a floating chrome layer, drifting aurora behind it
         so the refracted light is alive. Content sits on clean, legible
         surfaces. Built on SF, inset-grouped lists, a floating tab bar.
         ==================================================================== */
      :root {
        color-scheme: dark;
        --sans: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", system-ui, "Segoe UI", sans-serif;
        --accent: #36e6a4; --accent-ink: #03251a; --accent-soft: rgba(54,230,164,0.18);
        --nrk: #ff4d72; --tv2: #5b8cff;
        --fg: #f3f6fb; --muted: rgba(228,235,247,0.66); --faint: rgba(228,235,247,0.56);

        --base: #06070c;
        --c1: #1f5fe0; --c2: #14d8c6; --c3: #6b5bff; --c4: #0fa172;

        --bar-bg: rgba(18,22,32,0.22);
        --bar-border: rgba(255,255,255,0.18);
        --bar-hi: 0.55;
        --edge-top: 0.7; --edge-dk: 0.38; --drop: 0.55; --gleam: 0.36; --gleam-blend: screen;
        --card-bg: rgba(24,28,38,0.42);
        --card-border: rgba(255,255,255,0.14);
        --card-hi: 0.22;
        --row-line: rgba(255,255,255,0.075);
        --chip-bg: rgba(255,255,255,0.10);
        --no-tint: rgba(255,77,114,0.15);
        --adv: rgba(54,230,164,0.16);
        --shadow: 0 18px 50px rgba(0,0,0,0.5);
      }
      @media (prefers-color-scheme: light) {
        :root {
          color-scheme: light;
          --accent: #00a868; --accent-ink: #ffffff; --accent-soft: rgba(0,168,104,0.16);
          --nrk: #e4002b; --tv2: #2f6bff;
          --fg: #0b0e15; --muted: rgba(33,40,58,0.7); --faint: rgba(33,40,58,0.56);

          --base: #e7edf8;
          --c1: #a7ccff; --c2: #a3f0e6; --c3: #c6bcff; --c4: #aef0d2;

          --bar-bg: rgba(255,255,255,0.32);
          --bar-border: rgba(255,255,255,0.85);
          --bar-hi: 0.9;
          --edge-top: 0.95; --edge-dk: 0.12; --drop: 0.18; --gleam: 0.7; --gleam-blend: overlay;
          --card-bg: rgba(255,255,255,0.5);
          --card-border: rgba(255,255,255,0.8);
          --card-hi: 0.85;
          --row-line: rgba(15,23,42,0.08);
          --chip-bg: rgba(255,255,255,0.6);
          --no-tint: rgba(228,0,43,0.10);
          --adv: rgba(0,168,104,0.13);
          --shadow: 0 18px 44px rgba(28,40,75,0.16);
        }
      }
      * { box-sizing: border-box; }
      html { -webkit-text-size-adjust: 100%; }
      body {
        margin: 0; color: var(--fg); background: var(--base);
        font-family: var(--sans);
        font-size: 15px; line-height: 1.45; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
        padding-bottom: calc(env(safe-area-inset-bottom, 0) + 104px);
        overflow-x: hidden;
      }
      /* ---- living aurora: drifting modern hues, the light that gets refracted ---- */
      body::before {
        content: ""; position: fixed; inset: -25%; z-index: -2;
        background:
          radial-gradient(38% 38% at 18% 22%, var(--c1), transparent 60%),
          radial-gradient(42% 42% at 82% 16%, var(--c2), transparent 60%),
          radial-gradient(46% 46% at 70% 82%, var(--c3), transparent 62%),
          radial-gradient(40% 40% at 22% 88%, var(--c4), transparent 60%);
        filter: saturate(125%);
        animation: drift 26s ease-in-out infinite alternate;
        will-change: transform;
      }
      @keyframes drift {
        0%   { transform: translate3d(0, 0, 0) rotate(0deg) scale(1); }
        50%  { transform: translate3d(-3%, 2.5%, 0) rotate(2deg) scale(1.08); }
        100% { transform: translate3d(3.5%, -2%, 0) rotate(-2deg) scale(1.05); }
      }
      @media (prefers-reduced-motion: reduce) { body::before { animation: none; } }
      .glassfx { position: fixed; width: 0; height: 0; }
      .wrap { max-width: 600px; margin: 0 auto; padding: 0 16px; }
      a { color: inherit; text-decoration: none; }
      /* keyboard focus visibility (was missing entirely) */
      :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 8px; }
      .tabbar button:focus-visible { outline: none; }
      .tabbar button:focus-visible::before { opacity: 1; transform: scale(1); }
      @media (prefers-reduced-motion: reduce) { * { animation-duration: .01ms !important; transition-duration: .01ms !important; } }
      :root.anim-paused body::before { animation-play-state: paused; }

      /* ---- the glass material (chrome layer only) ---- */
      .bar {
        position: relative; overflow: hidden;
        background: var(--bar-bg);
        /* Fallback (Safari, which can't do url() refraction): clear frost */
        -webkit-backdrop-filter: blur(10px) saturate(195%) brightness(1.08);
        backdrop-filter: blur(10px) saturate(195%) brightness(1.08);
        border: 1px solid transparent;
        box-shadow:
          /* thick beveled glass edge: light catches the top/left, dark depth bottom/right */
          inset 0 2px 1px -0.5px rgba(255,255,255,var(--edge-top)),
          inset 1.5px 0 1px -0.5px rgba(255,255,255,calc(var(--edge-top) * 0.55)),
          inset -1.5px 0 1px -0.5px rgba(0,0,0,var(--edge-dk)),
          inset 0 -2.5px 2px -1px rgba(0,0,0,var(--edge-dk)),
          inset 0 0 0 1px rgba(255,255,255,calc(var(--edge-top) * 0.22)),
          /* chromatic dispersion at the rim (subtle) */
          inset 1.5px 0 6px -5px rgba(130,185,255,0.2),
          inset -1.5px 0 6px -5px rgba(255,160,215,0.18),
          0 22px 50px -8px rgba(0,0,0,var(--drop));                              /* float */
      }
      /* Real refraction: bend the actual backdrop through the glass. Only Chromium
         renders url() in backdrop-filter reliably, so it's gated to a .refract class
         set by JS — every other browser keeps the guaranteed frost fallback above. */
      html.refract .bar {
        -webkit-backdrop-filter: url(#liquid);
        backdrop-filter: url(#liquid);
      }
      /* convex specular highlight + a gleam that follows the pointer — reads as glass
         catching the light, and works in every browser */
      .bar::after {
        content: ""; position: absolute; inset: 0; border-radius: inherit; pointer-events: none; z-index: 1;
        background:
          radial-gradient(55% 90% at var(--gx, 50%) var(--gy, 0%), rgba(255,255,255,var(--gleam)), rgba(255,255,255,0) 62%),
          linear-gradient(180deg, rgba(255,255,255,0.2), rgba(255,255,255,0) 26%),
          linear-gradient(0deg, rgba(255,255,255,0.07), rgba(255,255,255,0) 30%);
        mix-blend-mode: var(--gleam-blend);
      }
      .bar > * { position: relative; z-index: 2; }

      /* ---- large title: part of the scroll content, no top chrome bar
         (only the bottom tab bar floats — keeps the design consistent) ---- */
      .titlehead { display: flex; align-items: center; gap: 12px; padding: calc(env(safe-area-inset-top, 0) + 22px) 0 6px; }
      .mark { width: 34px; height: 34px; flex: none; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.3)); }
      .titlehead h1 { font-size: 30px; font-weight: 800; letter-spacing: -0.03em; margin: 0; line-height: 1; }
      .titlehead .sub { font-size: 13px; color: var(--muted); font-weight: 500; }

      main { padding-top: 6px; }

      /* ---- inset-grouped day list ---- */
      .day-head { display: flex; align-items: baseline; gap: 10px; margin: 22px 6px 8px; scroll-margin-top: 14px; }
      .day-head:first-of-type { margin-top: 8px; }
      .day-head .dl { font-size: 13px; font-weight: 500; color: var(--muted); letter-spacing: -0.01em; }
      .day-head .dl b { color: var(--fg); font-weight: 700; }
      .dcount { margin-left: auto; font-size: 12px; color: var(--faint); font-weight: 500; white-space: nowrap; }
      .night { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--faint); margin: 12px 0 2px; padding-left: 2px; display: flex; align-items: center; gap: 5px; }
      .night .ic { width: 12px; height: 12px; }

      .card {
        background: var(--card-bg);
        -webkit-backdrop-filter: blur(7px) saturate(170%) brightness(1.04);
        backdrop-filter: blur(7px) saturate(170%) brightness(1.04);
        border: 1px solid var(--card-border);
        border-radius: 22px;
        box-shadow:
          inset 0 1.5px 0 rgba(255,255,255,var(--card-hi)),                /* thin glass top edge */
          inset 0 -1.5px 1px rgba(0,0,0,calc(var(--edge-dk) * 0.6)),        /* depth */
          var(--shadow);
        animation: rise 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      .card.group { padding: 2px 16px; margin: 0 0 22px; overflow: hidden; }
      @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

      /* ---- match row (compact, one line) ---- */
      .m { display: grid; grid-template-columns: 40px 1fr auto; align-items: center; gap: 9px; padding: 10px 0; border-bottom: 0.5px solid var(--row-line); }
      .m:last-child { border-bottom: none; }
      .m.no { margin: 0 -16px; padding: 10px 16px; background: linear-gradient(90deg, var(--no-tint), transparent 72%); box-shadow: inset 3px 0 0 var(--nrk); }
      /* reprise-ready (last night's catch-up) pops with an accent band; played-and-seen
         history is de-emphasised; upcoming stays normal weight */
      .m-rep:not(.no) { margin: 0 -16px; padding: 10px 16px; background: linear-gradient(90deg, var(--accent-soft), transparent 76%); box-shadow: inset 3px 0 0 var(--accent); }
      /* Norway catch-up match: keep the red identity bar AND signal reprise via accent tint */
      .m-rep.no { background: linear-gradient(90deg, var(--no-tint), var(--accent-soft) 60%, transparent 86%); }
      .m-done { opacity: 0.6; }
      .when.rep { color: var(--accent); font-weight: 700; font-size: 11.5px; letter-spacing: -0.02em; display: inline-flex; align-items: center; gap: 2px; }
      .when.rep .ic { width: 8px; height: 8px; }
      .when.na { color: var(--nrk); font-weight: 700; }
      .dcount .c-rep { color: var(--accent); font-weight: 700; }
      .dcount .c-live { color: var(--nrk); font-weight: 700; }
      .m .lt { font-size: 12px; font-weight: 600; color: var(--muted); font-variant-numeric: tabular-nums; }
      .m .live { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--nrk); box-shadow: 0 0 9px var(--nrk); animation: pulse 1.4s infinite; }
      @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .25; } }
      .teams { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 8px; min-width: 0; }
      .hh { display: flex; align-items: center; justify-content: flex-end; gap: 7px; min-width: 0; }
      .aa { display: flex; align-items: center; gap: 7px; min-width: 0; }
      .teams .nm { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: -0.01em; }
      .teams img { width: 20px; height: 20px; object-fit: contain; flex: none; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.22)); }
      /* fixed score-column width so home/away align across rows regardless of
         score vs "vs" vs hidden pill */
      /* fixed-width, centred box so home/away align identically across every row
         regardless of score / "vs" / "Vis" content */
      .md { font-size: 14px; font-weight: 700; font-variant-numeric: tabular-nums; width: 56px; box-sizing: border-box; text-align: center; display: inline-flex; align-items: center; justify-content: center; }
      .md.vs { color: var(--faint); font-weight: 500; }
      /* line icons (no emoji): inherit colour, scale with text */
      .ic { width: 1em; height: 1em; display: inline-block; vertical-align: -0.14em; flex: none; }
      /* hidden result — an explicit "Vis" (show) button, clearly tappable */
      .md.reveal {
        appearance: none; cursor: pointer; font: inherit; font-size: 11px; font-weight: 700; letter-spacing: -0.01em; line-height: 1;
        color: var(--accent); display: inline-flex; align-items: center; gap: 3px;
        background: var(--chip-bg); border: 0.5px solid var(--row-line); border-radius: 999px; padding: 4px 9px;
        -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px);
        box-shadow: inset 0 0.5px 0 rgba(255,255,255,0.25); transition: transform .12s, background .2s;
      }
      .md.reveal .ic { width: 13px; height: 13px; }
      .md.reveal:active { transform: scale(0.94); }
      /* a revealed result — tap to hide it again (reversible) */
      .md.shown {
        appearance: none; cursor: pointer; font: inherit; font-weight: 700; font-variant-numeric: tabular-nums;
        color: inherit; background: none; border: none; padding: 0;
        display: inline-flex; align-items: center; justify-content: center; gap: 4px;
        transition: transform .12s;
      }
      .md.shown:active { transform: scale(0.93); }
      .md.shown .eyeoff { display: inline-flex; color: var(--faint); }
      .md.shown .eyeoff .ic { width: 13px; height: 13px; }
      /* fixed action-column width so the replay button / star always sit in the same
         right-hand column — rows with and without a result no longer shift */
      .act { display: flex; align-items: center; justify-content: flex-end; gap: 6px; min-width: 92px; }
      .go {
        appearance: none; cursor: pointer; font: inherit; font-size: 11px; font-weight: 700;
        padding: 5px 11px; border-radius: 999px; border: 0.5px solid var(--row-line); color: var(--fg);
        background: var(--chip-bg); -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
        box-shadow: inset 0 0.5px 0 rgba(255,255,255,0.25); display: inline-flex; align-items: center; gap: 3px; white-space: nowrap;
        transition: transform .12s ease;
      }
      .go:active { transform: scale(0.94); }
      .go.nrk { background: var(--nrk); border-color: transparent; color: #fff; box-shadow: 0 4px 15px rgba(255,77,114,0.42), inset 0 0.5px 0 rgba(255,255,255,0.3); }
      .go.tv2 { background: var(--tv2); border-color: transparent; color: #fff; box-shadow: 0 4px 15px rgba(91,140,255,0.42), inset 0 0.5px 0 rgba(255,255,255,0.3); }
      .go.ghost { color: var(--muted); }
      .go .ic { width: 11px; height: 11px; }
      .star { appearance: none; background: none; border: none; cursor: pointer; color: var(--faint); padding: 0 1px; line-height: 0; display: inline-flex; align-items: center; transition: transform .12s ease; }
      .star .ic { width: 18px; height: 18px; }
      .star:active { transform: scale(1.3); }
      .star.on { color: var(--accent); filter: drop-shadow(0 0 7px var(--accent-soft)); }
      .wch { appearance: none; cursor: pointer; font: inherit; color: var(--faint); background: var(--chip-bg); border: 0.5px solid var(--row-line); border-radius: 999px; padding: 4px 7px; display: inline-flex; align-items: center; }
      .wch .ic { width: 14px; height: 14px; }
      .wch.on { color: var(--accent-ink); background: var(--accent); border-color: transparent; }

      /* ---- floating bottom tab bar ---- */
      .tabbar {
        position: fixed; left: 50%; transform: translateX(-50%); z-index: 50;
        bottom: calc(env(safe-area-inset-bottom, 0) + 14px);
        width: min(calc(100% - 24px), 460px);
        display: flex; gap: 2px; padding: 7px; border-radius: 26px;
      }
      .tabbar button {
        appearance: none; background: none; border: none; cursor: pointer; font: inherit;
        flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
        padding: 7px 4px 5px; border-radius: 18px; color: var(--muted);
        position: relative; transition: color .2s ease;
      }
      .tabbar button svg { width: 23px; height: 23px; }
      .tabbar button span { font-size: 10px; font-weight: 600; letter-spacing: -0.02em; white-space: nowrap; }
      .tabbar button::before {
        content: ""; position: absolute; inset: 0; border-radius: 18px; z-index: -1;
        background: var(--accent-soft); opacity: 0; transform: scale(0.85);
        transition: opacity .25s ease, transform .25s cubic-bezier(0.22,1,0.36,1);
      }
      .tabbar button.active { color: var(--accent); }
      /* SF-style emphasis: the selected tab's glyph gets a heavier weight */
      .tabbar button.active svg { stroke-width: 2.4; }
      .tabbar button.active::before { opacity: 1; transform: scale(1); }
      .tabbar button:active { transform: scale(0.95); }

      /* ---- bracket ---- */
      .bracket { display: flex; gap: 12px; overflow-x: auto; padding: 4px 2px 16px; }
      .round { flex: none; width: 184px; }
      .round > h4 { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--faint); font-weight: 700; margin: 0 0 9px; }
      .tie, .veil, .block {
        background: var(--card-bg);
        -webkit-backdrop-filter: blur(7px) saturate(170%) brightness(1.04);
        backdrop-filter: blur(7px) saturate(170%) brightness(1.04);
        border: 1px solid var(--card-border);
        box-shadow: inset 0 1.5px 0 rgba(255,255,255,var(--card-hi)), inset 0 -1.5px 1px rgba(0,0,0,calc(var(--edge-dk) * 0.6)), var(--shadow);
      }
      .tie { border-radius: 16px; padding: 9px 12px; margin-bottom: 10px; }
      .tie.final { border-color: var(--accent); box-shadow: inset 0 1px 0 rgba(255,255,255,var(--card-hi)), 0 8px 26px var(--accent-soft); }
      .t { display: flex; align-items: center; gap: 7px; padding: 2px 0; font-size: 13px; }
      .t img { width: 17px; height: 17px; object-fit: contain; flex: none; }
      .t .nm { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--muted); }
      .t.known .nm { color: var(--fg); font-weight: 600; }
      .t.win .nm { color: var(--accent); }
      .t .g { margin-left: auto; font-weight: 700; font-variant-numeric: tabular-nums; }
      .t.cand { flex-wrap: wrap; }
      .t .lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.03em; color: var(--faint); font-weight: 600; width: 100%; }
      .cfs { display: flex; gap: 3px; flex-wrap: wrap; }
      .cf { width: 17px; height: 17px; object-fit: contain; opacity: 0.5; }
      .cf.lead { opacity: 1; outline: 2px solid var(--accent); border-radius: 3px; }
      .dt { font-size: 10.5px; color: var(--faint); margin-top: 6px; font-weight: 500; }

      /* ---- stats ---- */
      .block { margin-bottom: 14px; padding: 13px 16px; border-radius: 18px; }
      .block > h3 { font-size: 13px; font-weight: 700; margin: 0 0 10px; letter-spacing: -0.01em; }
      .h3ic { display: flex; align-items: center; gap: 6px; }
      .h3ic .ic { width: 13px; height: 13px; color: var(--accent); }
      /* fixed layout so number columns stay narrow and team names ellipsise
         instead of pushing the table wider than the card (mobile overflow) */
      table { width: 100%; border-collapse: collapse; table-layout: fixed; font-size: 13px; font-variant-numeric: tabular-nums; }
      th { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--faint); font-weight: 600; padding: 0 4px 7px; text-align: center; }
      td { padding: 8px 4px; text-align: center; border-top: 0.5px solid var(--row-line); }
      th.l, td.l { text-align: left; }
      th:not(.l), td:not(.l) { width: 34px; }
      td.team { display: flex; align-items: center; gap: 8px; font-weight: 500; min-width: 0; }
      td.team img { width: 18px; height: 18px; object-fit: contain; flex: none; }
      td.team .nm { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
      td.rt { justify-content: flex-end; text-align: right; }
      tr.adv td { background: var(--adv); }
      td .rk { color: var(--faint); min-width: 16px; display: inline-block; text-align: right; flex: none; }
      .pts { font-weight: 700; }
      h4.gh { font-size: 12px; font-weight: 700; color: var(--muted); margin: 16px 0 6px; }
      h4.gh:first-of-type { margin-top: 4px; }
      .statline { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px 12px; padding: 2px 2px 14px; }
      .statline > div { min-width: 0; }
      .statline .n { font-size: 26px; font-weight: 800; letter-spacing: -0.03em; line-height: 1.05; }
      .statline .k { font-size: 11px; color: var(--muted); font-weight: 500; }
      /* segmented control to organise the stats (Spillere · Lag · Tabeller) */
      .seg { display: flex; gap: 3px; padding: 3px; margin: 2px 0 16px; border-radius: 13px; background: var(--chip-bg); border: 0.5px solid var(--row-line); -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px); }
      .seg button { flex: 1; appearance: none; cursor: pointer; font: inherit; font-size: 12.5px; font-weight: 600; color: var(--muted); background: none; border: none; border-radius: 10px; padding: 8px 4px; transition: background .2s, color .2s; }
      .seg button.on { color: var(--fg); background: var(--card-bg); box-shadow: inset 0 1px 0 rgba(255,255,255,var(--card-hi)), 0 1px 4px rgba(0,0,0,0.18); }
      /* biggest-wins as clean centred rows (a table mis-centred the score) */
      .winrow { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 10px; padding: 8px 0; border-top: 0.5px solid var(--row-line); font-size: 13px; }
      .winrow:first-child { border-top: none; }
      .winrow .wh { display: flex; align-items: center; justify-content: flex-end; gap: 7px; min-width: 0; }
      .winrow .wa { display: flex; align-items: center; gap: 7px; min-width: 0; }
      .winrow .nm { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .winrow img { width: 18px; height: 18px; object-fit: contain; flex: none; }
      .winrow .sc { font-weight: 800; font-variant-numeric: tabular-nums; }

      .veil { text-align: center; padding: 34px 20px; border-radius: 20px; color: var(--muted); }
      .veilic { color: var(--accent); display: inline-block; margin-bottom: 8px; }
      .veilic .ic { width: 28px; height: 28px; }
      .reveal-btn { appearance: none; cursor: pointer; font: inherit; font-size: 13px; font-weight: 700; margin-top: 16px; padding: 11px 20px; border-radius: 999px; border: none; background: var(--accent); color: var(--accent-ink); box-shadow: 0 6px 22px var(--accent-soft); display: inline-flex; align-items: center; gap: 7px; }
      .reveal-btn .ic { width: 15px; height: 15px; }
      .reveal-btn:active { transform: scale(0.96); }
      /* re-hide-all safety net */
      .resetbar { display: flex; justify-content: center; margin: 2px 0 -2px; }
      .reset {
        appearance: none; cursor: pointer; font: inherit; font-size: 12px; font-weight: 600; color: var(--muted);
        background: var(--card-bg); border: 0.5px solid var(--card-border); border-radius: 999px; padding: 7px 15px;
        -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px); box-shadow: inset 0 1px 0 rgba(255,255,255,var(--card-hi));
        display: inline-flex; align-items: center; gap: 6px; transition: transform .12s;
      }
      .reset .ic { width: 13px; height: 13px; }
      .reset:active { transform: scale(0.97); }
      /* one-time explainer for the automatic spoiler behaviour */
      .hint { display: flex; align-items: flex-start; gap: 10px; margin: 4px 0 2px; padding: 12px 14px; border-radius: 16px; background: var(--card-bg); border: 0.5px solid var(--card-border); box-shadow: inset 0 1px 0 rgba(255,255,255,var(--card-hi)); -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px); font-size: 12.5px; color: var(--muted); line-height: 1.5; }
      .hint .ic { width: 16px; height: 16px; color: var(--accent); margin-top: 1px; }
      .hint b { color: var(--fg); font-weight: 700; }
      .hint .x { margin-left: auto; appearance: none; background: none; border: none; cursor: pointer; color: var(--faint); font: inherit; font-size: 16px; line-height: 1; padding: 0 2px; flex: none; }
      /* filter chips: jump to Norway / your plan */
      .filters { display: flex; gap: 8px; margin: 2px 0 4px; }
      .chip { appearance: none; cursor: pointer; font: inherit; font-size: 12.5px; font-weight: 600; color: var(--muted); background: var(--chip-bg); border: 0.5px solid var(--row-line); border-radius: 999px; padding: 6px 13px; display: inline-flex; align-items: center; gap: 5px; -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px); transition: transform .12s; }
      .chip .ic { width: 13px; height: 13px; }
      .chip:active { transform: scale(0.96); }
      .chip.on { color: var(--accent-ink); background: var(--accent); border-color: transparent; }
      .empty { text-align: center; color: var(--muted); padding: 44px 16px; }
      footer { color: var(--faint); font-size: 11px; text-align: center; padding: 24px 16px 8px; line-height: 1.7; }

      /* ---- narrow phones: give team names room, stop truncation ---- */
      @media (max-width: 430px) {
        .wrap { padding: 0 12px; }
        .card.group { padding: 2px 12px; }
        .m { grid-template-columns: 34px 1fr auto; gap: 7px; }
        .m.no, .m-rep:not(.no), .m-rep.no { margin: 0 -12px; padding: 10px 12px; }
        .md { width: 46px; font-size: 13px; }
        .md.reveal { font-size: 10.5px; padding: 4px 6px; }
        .act { min-width: 0; gap: 5px; }
        .go { padding: 5px 7px; }              /* icon-only on mobile */
        .go .golbl { display: none; }
        .teams { gap: 6px; }
        .teams .nm { font-size: 13.5px; }
        .teams img { width: 18px; height: 18px; }
        .day-head { flex-wrap: wrap; row-gap: 2px; }
        .day-head .dl { min-width: 0; }
        .statline .n { font-size: 24px; }
        .block.card, .block { padding: 12px; }
        table { font-size: 12px; }
        th, td { padding: 7px 3px; }
        th:not(.l), td:not(.l) { width: 28px; }
        td.team { gap: 7px; min-width: 0; }
        td.team span, td.team { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .bracket .round { width: 168px; }
      }
      @media (max-width: 340px) { .md { width: 40px; } .teams .nm { font-size: 13px; } }
    </style>

  <body>
    <!-- SVG glass distortion: turbulence drives a displacement map that bends the
         refracted backdrop, the defining optical trait of Liquid Glass. -->
    <svg class="glassfx" aria-hidden="true">
      <!-- Apple-style edge lens: two gradient displacement maps bend the backdrop only
           near the rounded edges (neutral 128 in the centre band), so light refracts
           through the rim like a real glass lozenge; a faint turbulence adds life. -->
      <filter id="liquid" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
        <feImage href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22240%22%20height%3D%22120%22%3E%3Cdefs%3E%3ClinearGradient%20id%3D%22g%22%20x1%3D%220%22%20y1%3D%220%22%20x2%3D%221%22%20y2%3D%220%22%3E%3Cstop%20offset%3D%220%22%20stop-color%3D%22rgb(255%2C128%2C128)%22%2F%3E%3Cstop%20offset%3D%220.30%22%20stop-color%3D%22rgb(128%2C128%2C128)%22%2F%3E%3Cstop%20offset%3D%220.70%22%20stop-color%3D%22rgb(128%2C128%2C128)%22%2F%3E%3Cstop%20offset%3D%221%22%20stop-color%3D%22rgb(0%2C128%2C128)%22%2F%3E%3C%2FlinearGradient%3E%3C%2Fdefs%3E%3Crect%20width%3D%22240%22%20height%3D%22120%22%20fill%3D%22url(%23g)%22%2F%3E%3C%2Fsvg%3E" result="xm" preserveAspectRatio="none" x="0" y="0" width="100%" height="100%" />
        <feImage href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22240%22%20height%3D%22120%22%3E%3Cdefs%3E%3ClinearGradient%20id%3D%22g%22%20x1%3D%220%22%20y1%3D%220%22%20x2%3D%220%22%20y2%3D%221%22%3E%3Cstop%20offset%3D%220%22%20stop-color%3D%22rgb(128%2C255%2C128)%22%2F%3E%3Cstop%20offset%3D%220.30%22%20stop-color%3D%22rgb(128%2C128%2C128)%22%2F%3E%3Cstop%20offset%3D%220.70%22%20stop-color%3D%22rgb(128%2C128%2C128)%22%2F%3E%3Cstop%20offset%3D%221%22%20stop-color%3D%22rgb(128%2C0%2C128)%22%2F%3E%3C%2FlinearGradient%3E%3C%2Fdefs%3E%3Crect%20width%3D%22240%22%20height%3D%22120%22%20fill%3D%22url(%23g)%22%2F%3E%3C%2Fsvg%3E" result="ym" preserveAspectRatio="none" x="0" y="0" width="100%" height="100%" />
        <feGaussianBlur in="xm" stdDeviation="9" result="xmb" />
        <feGaussianBlur in="ym" stdDeviation="9" result="ymb" />
        <feDisplacementMap in="SourceGraphic" in2="xmb" scale="15" xChannelSelector="R" yChannelSelector="B" result="dx" />
        <feDisplacementMap in="dx" in2="ymb" scale="15" xChannelSelector="B" yChannelSelector="G" result="dxy" />
        <feTurbulence type="fractalNoise" baseFrequency="0.012 0.016" numOctaves="2" seed="9" result="t" />
        <feDisplacementMap in="dxy" in2="t" scale="4" xChannelSelector="R" yChannelSelector="G" result="rip" />
        <feGaussianBlur in="rip" stdDeviation="2" result="frost" />
        <feColorMatrix in="frost" type="saturate" values="1.7" />
      </filter>
    </svg>

    <script>
      // Pointer-reactive specular gleam: the highlight on each glass bar tracks the
      // cursor/touch, so the glass visibly "catches the light" as you move — a reliable
      // liquid-glass cue in every browser. Idle, a slow drift keeps it alive.
      (function () {
        const bars = () => document.querySelectorAll(".bar");
        let raf = 0;
        const place = (x, y) => {
          cancelAnimationFrame(raf);
          raf = requestAnimationFrame(() => {
            bars().forEach((el) => {
              const r = el.getBoundingClientRect();
              el.style.setProperty("--gx", Math.max(-20, Math.min(120, ((x - r.left) / r.width) * 100)) + "%");
              el.style.setProperty("--gy", Math.max(-40, Math.min(140, ((y - r.top) / r.height) * 100)) + "%");
            });
          });
        };
        addEventListener("pointermove", (e) => place(e.clientX, e.clientY), { passive: true });
      })();

      // Load app.js with a cache-busting version tied to the latest data build,
      // so a fresh deploy is never masked by a stale cached script.
      fetch("data/meta.json", { cache: "no-store" })
        .then((r) => r.json()).then((m) => m.updated).catch(() => Date.now())
        .then((v) => { const s = document.createElement("script"); s.src = "js/app.js?v=" + encodeURIComponent(v); document.body.appendChild(s); });
    </script>
