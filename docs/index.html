<!DOCTYPE html>
<html lang="nb">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>VM 2026</title>
    <meta name="description" content="Følg og ta igjen fotball-VM 2026 — kamper dag for dag, sluttspill, statistikk og spoilerfri reprisplanlegging med direktelenker til NRK TV og TV 2 Play." />
    <meta name="theme-color" content="#0a0a0b" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='14' fill='%23000'/%3E%3Ccircle cx='34' cy='50' r='18' fill='none' stroke='%23fff' stroke-width='9'/%3E%3Cpath d='M58 32h18a0 0 0 0 1 0 0v0a18 18 0 0 1-18 18h0a0 0 0 0 1 0 0V32z' fill='%2300e58a'/%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #0a0a0b; --surface: #161618; --raise: #1f1f23;
        --line: rgba(255,255,255,0.1); --line2: rgba(255,255,255,0.2);
        --fg: #f7f7f8; --muted: #a6a6af; --faint: #7c7c86;
        --accent: #00e58a; --accent-ink: #00160d;
        --nrk: #e4002b; --tv2: #2f6bff; --adv: rgba(0,229,138,0.14);
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #ffffff; --surface: #f4f4f5; --raise: #ececee;
          --line: rgba(0,0,0,0.1); --line2: rgba(0,0,0,0.22);
          --fg: #0a0a0b; --muted: #585862; --faint: #87878f;
          --accent: #00b06a; --accent-ink: #ffffff; --adv: rgba(0,176,106,0.12);
        }
      }
      * { box-sizing: border-box; }
      html { -webkit-text-size-adjust: 100%; }
      body {
        margin: 0; background: var(--bg); color: var(--fg);
        font-family: "Noto Sans", system-ui, sans-serif;
        font-size: 15px; line-height: 1.45; -webkit-font-smoothing: antialiased;
        padding-bottom: calc(env(safe-area-inset-bottom, 0) + 28px);
      }
      .wrap { max-width: 580px; margin: 0 auto; padding: 0 16px; }
      a { color: inherit; text-decoration: none; }

      /* ---- header ---- */
      header {
        position: sticky; top: 0; z-index: 30; background: var(--bg);
        border-bottom: 1px solid var(--line); padding-top: max(10px, env(safe-area-inset-top, 0));
      }
      .brand { display: flex; align-items: center; gap: 10px; padding: 2px 0 10px; }
      .mark { width: 26px; height: 26px; flex: none; }
      .brand h1 { font-size: 20px; font-weight: 900; letter-spacing: -0.03em; margin: 0; }
      .brand .sub { font-size: 11.5px; color: var(--muted); font-weight: 500; margin-left: 2px; }
      .eye {
        margin-left: auto; appearance: none; cursor: pointer; font: inherit; font-size: 11px;
        font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted);
        background: none; border: 1px solid var(--line2); border-radius: 999px; padding: 6px 13px;
        display: inline-flex; align-items: center; gap: 6px;
      }
      .eye.on { color: var(--accent-ink); background: var(--accent); border-color: var(--accent); }

      nav.tabs { display: flex; gap: 22px; }
      nav.tabs button {
        appearance: none; background: none; border: none; cursor: pointer; font: inherit;
        font-size: 14px; font-weight: 700; color: var(--muted); padding: 7px 0 12px;
        position: relative; letter-spacing: -0.01em;
      }
      nav.tabs button.active { color: var(--fg); }
      nav.tabs button.active::after { content: ""; position: absolute; left: 0; right: 0; bottom: -1px; height: 3px; background: var(--accent); }

      main { padding-top: 14px; }

      /* ---- scope toggle + day headers (continuous week view) ---- */
      .scopebar { display: flex; margin-bottom: 6px; }
      .seg { display: flex; background: var(--surface); border: 1px solid var(--line); border-radius: 999px; padding: 3px; }
      .seg button { appearance: none; cursor: pointer; font: inherit; font-size: 12.5px; font-weight: 700; color: var(--muted); background: none; border: none; padding: 6px 16px; border-radius: 999px; }
      .seg button.on { color: var(--accent-ink); background: var(--accent); }

      .day { display: flex; align-items: baseline; gap: 10px; margin: 24px 0 6px; padding-bottom: 7px; border-bottom: 1px solid var(--line2); }
      .day:first-of-type { margin-top: 4px; }
      .day .dl { font-size: 14px; font-weight: 600; color: var(--muted); }
      .day .dl b { color: var(--fg); font-weight: 800; text-transform: uppercase; letter-spacing: 0.02em; }
      .dcount { margin-left: auto; font-size: 11px; color: var(--muted); font-weight: 600; white-space: nowrap; }
      .night { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin: 12px 0 0; padding-left: 2px; }

      /* ---- match row (compact, one line) ---- */
      .m { display: grid; grid-template-columns: 38px 1fr auto; align-items: center; gap: 9px; padding: 8px 0; border-bottom: 1px solid var(--line); }
      .m.no { margin: 0 -10px; padding: 8px 10px; background: linear-gradient(90deg, rgba(228,0,43,0.11), transparent 70%); border-left: 3px solid var(--nrk); }
      .m .lt { font-size: 12px; font-weight: 700; color: var(--muted); font-variant-numeric: tabular-nums; }
      .m .live { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--nrk); animation: pulse 1.4s infinite; }
      @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .25; } }
      .teams { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 8px; min-width: 0; }
      .hh { display: flex; align-items: center; justify-content: flex-end; gap: 7px; min-width: 0; }
      .aa { display: flex; align-items: center; gap: 7px; min-width: 0; }
      .teams .nm { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .teams img { width: 19px; height: 19px; object-fit: contain; flex: none; }
      .md { font-size: 14px; font-weight: 800; font-variant-numeric: tabular-nums; min-width: 30px; text-align: center; }
      .md.hide { color: var(--faint); cursor: pointer; font-weight: 700; letter-spacing: 1px; }
      .md.hide:hover { color: var(--muted); }
      .md.vs { color: var(--faint); font-weight: 600; }
      .act { display: flex; align-items: center; gap: 6px; }
      .go {
        appearance: none; cursor: pointer; font: inherit; font-size: 11px; font-weight: 800;
        padding: 4px 8px; border-radius: 7px; border: 1px solid var(--line); background: var(--surface);
        color: var(--fg); display: inline-flex; align-items: center; gap: 3px; white-space: nowrap;
      }
      .go.nrk { background: var(--nrk); border-color: var(--nrk); color: #fff; }
      .go.tv2 { background: var(--tv2); border-color: var(--tv2); color: #fff; }
      .go.ghost { background: transparent; color: var(--muted); }
      .star { appearance: none; background: none; border: none; cursor: pointer; font-size: 15px; color: var(--faint); padding: 0 1px; line-height: 1; }
      .star.on { color: var(--accent); }
      .wch { appearance: none; cursor: pointer; font: inherit; font-size: 12px; color: var(--faint); background: none; border: 1px solid var(--line); border-radius: 6px; padding: 2px 7px; }
      .wch.on { color: var(--accent); border-color: var(--accent); }

      /* ---- bracket ---- */
      .bracket { display: flex; gap: 12px; overflow-x: auto; padding: 4px 2px 16px; }
      .round { flex: none; width: 178px; }
      .round > h4 { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--faint); font-weight: 800; margin: 0 0 9px; }
      .tie { background: var(--surface); border: 1px solid var(--line); border-radius: 10px; padding: 8px 10px; margin-bottom: 9px; }
      .tie.final { border-color: var(--accent); }
      .t { display: flex; align-items: center; gap: 7px; padding: 2px 0; font-size: 13px; }
      .t img { width: 16px; height: 16px; object-fit: contain; flex: none; }
      .t .nm { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--muted); }
      .t.known .nm { color: var(--fg); font-weight: 700; }
      .t.win .nm { color: var(--accent); }
      .t .g { margin-left: auto; font-weight: 800; font-variant-numeric: tabular-nums; }
      .t.cand { flex-wrap: wrap; }
      .t .lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.03em; color: var(--faint); font-weight: 700; width: 100%; }
      .cfs { display: flex; gap: 3px; flex-wrap: wrap; }
      .cf { width: 17px; height: 17px; object-fit: contain; opacity: 0.5; }
      .cf.lead { opacity: 1; outline: 2px solid var(--accent); border-radius: 3px; }
      .dt { font-size: 10.5px; color: var(--faint); margin-top: 5px; font-weight: 600; }

      /* ---- stats ---- */
      .block { margin-bottom: 22px; }
      .block > h3 { font-size: 13px; font-weight: 800; margin: 0 0 9px; }
      table { width: 100%; border-collapse: collapse; font-size: 13px; font-variant-numeric: tabular-nums; }
      th { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--faint); font-weight: 700; padding: 0 6px 7px; text-align: center; }
      td { padding: 8px 6px; text-align: center; border-top: 1px solid var(--line); }
      th.l, td.l { text-align: left; }
      td.team { display: flex; align-items: center; gap: 9px; font-weight: 600; }
      td.team img { width: 18px; height: 18px; object-fit: contain; }
      tr.adv td { background: var(--adv); }
      td .rk { color: var(--faint); min-width: 20px; margin-right: 8px; display: inline-block; text-align: right; }
      .pts { font-weight: 800; }
      .statline { display: flex; gap: 22px; padding: 2px 0 18px; }
      .statline .n { font-size: 26px; font-weight: 900; letter-spacing: -0.03em; }
      .statline .k { font-size: 11px; color: var(--muted); font-weight: 600; }

      .veil { text-align: center; padding: 32px 18px; border: 1px dashed var(--line2); border-radius: 14px; color: var(--muted); }
      .veil .pill { margin-top: 14px; }
      .empty { text-align: center; color: var(--muted); padding: 44px 16px; }
      footer { color: var(--faint); font-size: 11px; text-align: center; padding: 28px 16px 8px; line-height: 1.7; }
    </style>
  </head>
  <body>
    <header>
      <div class="wrap">
        <div class="brand">
          <svg class="mark" viewBox="0 0 100 100" aria-hidden="true">
            <circle cx="33" cy="52" r="20" fill="none" stroke="currentColor" stroke-width="10" />
            <path d="M60 28h22a0 0 0 0 1 0 0a22 22 0 0 1-22 22h0V28z" fill="var(--accent)" />
            <rect x="60" y="56" width="22" height="16" rx="2" fill="currentColor" />
          </svg>
          <h1>VM 2026</h1>
          <span class="sub">følg &amp; ta igjen</span>
          <button class="eye" id="spoilerToggle">🙈 <span id="modeLabel">Spoilerfri</span></button>
        </div>
        <nav class="tabs" id="tabs">
          <button data-view="schedule" class="active">Kamper</button>
          <button data-view="bracket">Sluttspill</button>
          <button data-view="stats">Statistikk</button>
          <button data-view="plan">Min plan</button>
        </nav>
      </div>
    </header>
    <main class="wrap" id="app"><div class="empty">Laster …</div></main>
    <footer>
      Data: ESPN · Reprise: NRK TV &amp; TV 2 Play · Alle tider i Oslo-tid<br />
      Spoilerfri som standard — skru på spoiler for å ta igjen resultater, tabeller og toppscorere.
    </footer>
    <script>
      // Load app.js with a cache-busting version tied to the latest data build,
      // so a fresh deploy is never masked by a stale cached script.
      fetch("data/meta.json", { cache: "no-store" })
        .then((r) => r.json()).then((m) => m.updated).catch(() => Date.now())
        .then((v) => { const s = document.createElement("script"); s.src = "js/app.js?v=" + encodeURIComponent(v); document.body.appendChild(s); });
    </script>
  </body>
</html>
